<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>찬조 글로그 틀</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Nanum+Myeongjo:wght@700;800&family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
            padding: 20px;
            gap: 30px;
            justify-content: center;
        }
        .editor-container {
            width: 400px;
            background-color: #2d2d2d;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: fit-content;
        }
        .editor-container h2 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            border-bottom: 2px solid #444;
            padding-bottom: 8px;
            color: #ddd;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 0.85rem;
            color: #aaa;
            font-weight: bold;
        }
        .form-group input, .form-group textarea, .form-group select {
            background-color: #1a1a1a;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .form-group textarea {
            resize: vertical;
            height: 180px;
        }
        .range-val {
            font-size: 0.8rem;
            color: #4a6fa5;
            float: right;
        }
        .btn-save {
            background-color: #4a6fa5;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-save:hover {
            background-color: #3b5984;
        }

        .preview-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: auto;
        }
        #capture-area {
            width: 1000px;
            height: 800px;
            position: relative;
            background-color: #1a1a1a;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        
        .bg-blur-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.6); 
            transform: scale(1.1);
            z-index: 1;
            display: none;
        }

        .text-card {
            position: absolute;
            top: 0;
            left: 100px;
            width: 380px;
            height: 100%;
            background-color: #ffffff;
            z-index: 3;
            padding: 60px 40px 40px 40px;
            color: #000000;
            display: flex;
            flex-direction: column;
            gap: 30px;
            font-family: 'Noto Serif KR', serif; 
        }
        .card-title {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.4;
            word-break: keep-all;
        }
        .card-content {
            font-size: 16px;
            line-height: 1.9; 
            white-space: pre-wrap;
            color: #222;
            overflow: hidden;
            text-align: justify;
        }

        .main-image-box {
            position: absolute;
            top: 180px;
            right: 120px;
            width: 360px;
            height: 520px;
            background-color: #252525;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 5px 5px 20px rgba(0,0,0,0.4);
            z-index: 3;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-image-box .no-img-msg {
            color: #555;
            font-size: 0.9rem;
        }
        
 
        .main-image-box img {
            width: 130%;
            height: 130%;
            object-fit: cover;
            position: absolute;
            top: -15%;
            left: -15%;
            display: none;
        }
        
        .copyright-tag {
            position: absolute;
            bottom: 25px;
            right: 120px;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            z-index: 3;
            font-family: sans-serif;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <h2>본문 입력</h2>
        
        <div class="form-group">
            <label for="input-title">제목</label>
            <input type="text" id="input-title" value="제목">
        </div>
        
        <div class="form-group">
            <label for="input-text">본문</label>
            <textarea id="input-text">본문 내용을 입력해주세요.</textarea>
        </div>

        <div class="form-group">
            <label for="select-font">폰트</label>
            <select id="select-font">
                <option value="'Noto Serif KR', serif">Noto Serif KR</option>
                <option value="'Nanum Myeongjo', serif">나눔명조</option>
                <option value="'Noto Sans KR', sans-serif">Noto Sans KR</option>
                <option value="'Nanum Gothic', sans-serif">나눔고딕</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>그림 첨부</label>
            <input type="file" id="input-image" accept="image/*">
        </div>

        <div class="form-group">
            <label>이미지 좌우 위치 조절 <span class="range-val" id="val-x">0px</span></label>
            <input type="range" id="range-x" min="-400" max="400" value="0">
        </div>
        <div class="form-group">
            <label>이미지 상하 위치 조절 <span class="range-val" id="val-y">0px</span></label>
            <input type="range" id="range-x-y" min="-400" max="400" value="0">
        </div>

        <div class="form-group">
            <label for="input-copy">출처 표기</label>
            <input type="text" id="input-copy" value="변변찮은 창조주" placeholder="없을 시 공란">
            <small style="color: #aaa; font-size: 0.75rem; margin-top: 2px;">* 글자를 모두 지우면 다운로드 시 보이지 않습니다.</small>
        </div>
        
        <button class="btn-save" onclick="saveAsImage()">이미지 다운로드</button>
    </div>

    <div class="preview-container">
        <div id="capture-area">
            <div class="bg-blur-box" id="view-bg"></div>
            
            <div class="text-card" id="text-card-zone">
                <div class="card-title" id="view-title">제목</div>
                <div class="card-content" id="view-content">본문 내용을 입력해주세요.</div>
            </div>
            
            <div class="main-image-box">
                <span class="no-img-msg" id="no-img-txt">그림을 첨부해주세요</span>
                <img id="view-image" src="" alt="그림">
            </div>
            
            <div class="copyright-tag" id="view-copy">© 변변찮은 창조주</div>
        </div>
    </div>

    <script>
        const inputTitle = document.getElementById('input-title');
        const inputText = document.getElementById('input-text');
        const selectFont = document.getElementById('select-font');
        const inputImage = document.getElementById('input-image');
        const inputCopy = document.getElementById('input-copy');
        
        const rangeX = document.getElementById('range-x');
        const rangeY = document.getElementById('range-x-y');
        const valX = document.getElementById('val-x');
        const valY = document.getElementById('val-y');

        const viewTitle = document.getElementById('view-title');
        const viewContent = document.getElementById('view-content');
        const textCardZone = document.getElementById('text-card-zone');
        const viewImage = document.getElementById('view-image');
        const viewBg = document.getElementById('view-bg');
        const viewCopy = document.getElementById('view-copy');
        const noImgTxt = document.getElementById('no-img-txt');

        // 기본 130% 스케일 적용 시 중앙 위치 확보를 위한 고정 마진 비율 (-15%)
        const baseOffset = -15; 

        inputTitle.addEventListener('input', () => { viewTitle.textContent = inputTitle.value; });
        inputText.addEventListener('input', () => { viewContent.textContent = inputText.value; });
        
        inputCopy.addEventListener('input', () => {
            const val = inputCopy.value.trim();
            if (val === '') { viewCopy.textContent = ''; } 
            else { viewCopy.textContent = '© ' + val; }
        });

        selectFont.addEventListener('change', () => {
            const selectedFont = selectFont.value;
            textCardZone.style.fontFamily = selectedFont;
            viewTitle.style.fontFamily = selectedFont;
            viewContent.style.fontFamily = selectedFont;
        });

        rangeX.addEventListener('input', () => {
            viewImage.style.left = `calc(${baseOffset}% + ${rangeX.value}px)`;
            valX.textContent = rangeX.value + 'px';
        });
        rangeY.addEventListener('input', () => {
            viewImage.style.top = `calc(${baseOffset}% + ${rangeY.value}px)`;
            valY.textContent = rangeY.value + 'px';
        });

        inputImage.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    noImgTxt.style.display = 'none';
                    viewImage.style.display = 'block'; 
                    viewBg.style.display = 'block'; 
                    
                    viewImage.src = event.target.result;
                    viewBg.style.backgroundImage = `url('${event.target.result}')`;

                    rangeX.value = 0;
                    rangeY.value = 0;
                    valX.textContent = '0px';
                    valY.textContent = '0px';
                    viewImage.style.left = baseOffset + '%';
                    viewImage.style.top = baseOffset + '%';
                }
                reader.readAsDataURL(file);
            }
        });

        function saveAsImage() {
            const captureArea = document.getElementById('capture-area');
            html2canvas(captureArea, {
                useCORS: true,
                scale: 2, 
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'story_log_' + new Date().toISOString().slice(0,10) + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                alert('이미지 저장 중 오류가 발생했습니다.');
                console.error(err);
            });
        }
    </script>
</body>
</html>
